name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm test

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Démarrer l'application
        run: npm start &
        env:
          PORT: 3000
      - name: Attendre que l'app soit prête
        run: |
          for i in {1..15}; do
            curl -s http://localhost:3000/health && break
            echo "Attente... ($i)"
            sleep 2
          done
      - name: Lancer Cypress
        run: npx cypress run

  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-app:${{ github.sha }}

  deploy:
    name: Deploy on Azure VM
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mon-app:latest
            docker stop myapp 2>/dev/null || true
            docker rm myapp 2>/dev/null || true
            docker run -d \
              --name myapp \
              --restart unless-stopped \
              -p 3000:3000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/mon-app:latest
            sleep 5
            curl -f http://localhost:3000/health || exit 1
            echo "Déploiement réussi !"